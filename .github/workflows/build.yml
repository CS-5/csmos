name: Build QMK firmware

on:
  push:
    paths:
      - 'keyboards/**'
      - 'qmk.json'
  pull_request:
    paths:
      - 'keyboards/**'
      - 'qmk.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: QMK Userspace Build
    uses: qmk/.github/.github/workflows/qmk_userspace_build.yml@main
    with:
      qmk_repo: vial-kb/vial-qmk
      qmk_ref: vial
      preparation_command: ln -s "$PWD/keyboards/cosmos" qmk_firmware/keyboards/cosmos && git clone --depth 1 https://github.com/getreuer/qmk-modules.git modules/getreuer

  publish:
    name: QMK Userspace Publish
    uses: qmk/.github/.github/workflows/qmk_userspace_publish.yml@main
    if: always() && !cancelled()
    needs: build
